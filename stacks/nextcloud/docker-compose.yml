version: "3.8"
services:

  db:
    image: mariadb:10.6
    restart: always
    environment:
      # Set values in .env file — see .env.example
      MYSQL_ROOT_PASSWORD: # removed
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: # removed
    volumes:
      - nextcloud_db:/var/lib/mysql

  app:
    image: nextcloud
    restart: always
    ports:
      - "8080:80"
    volumes:
      - nextcloud_app:/var/www/html
      - /backup/cloud:/var/www/html/data
    depends_on:
      - db

volumes:
  nextcloud_db:
  nextcloud_app:
