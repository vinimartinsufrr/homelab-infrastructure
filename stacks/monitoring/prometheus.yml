global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      # node-exporter communicates via Docker internal network
      - targets: ['node-exporter:9100']

  - job_name: 'containers'
    static_configs:
      # cAdvisor communicates via Docker internal network (internal port 8080, not the mapped 8082)
      - targets: ['cadvisor:8080']

  - job_name: 'uptime-kuma'
    static_configs:
      - targets: ['uptime-kuma:3001']
